version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - delid-net

  backend:
    build: ./backend
    restart: always
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    volumes:
      - uploads:/app/uploads
    networks:
      - delid-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./frontend:/usr/share/nginx/html
      - uploads:/usr/share/nginx/html/uploads
    depends_on:
      - backend
    networks:
      - delid-net

volumes:
  pgdata:
  uploads:

networks:
  delid-net:
