<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Delid SaaS</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="loginBox">
    <h2>🔐 Painel Administrativo Delid</h2>
    <div class="grupo-input"><label>Usuário Super Admin</label><input type="text" id="adminUser"></div>
    <div class="grupo-input"><label>Senha</label><input type="password" id="adminPass"></div>
    <div class="erro" id="adminErro"></div>
    <button class="btn" onclick="loginAdmin()">Entrar</button>
</div>

<div id="painelAdmin">
    <div class="topo">
        <h1>📊 Painel Administrativo — Clientes SaaS</h1>
        <div class="topo-acoes">
            <button class="btn-secundario" onclick="abrirModalMinhaSenha()">🔑 Trocar minha senha</button>
            <button class="btn-sair" onclick="logoutAdmin()">Sair</button>
        </div>
    </div>
    <div class="cards" id="cardsResumo"></div>
    <table>
        <thead><tr><th>Empresa</th><th>Plano</th><th>Usuários</th><th>Expira em</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="corpoTabelaEmpresas"></tbody>
    </table>
</div>

<div class="overlay" id="overlayRedefinir">
    <div class="modal">
        <button class="fechar" onclick="fecharModalRedefinir()">✕</button>
        <h3>Redefinir senha do usuário</h3>
        <div class="grupo-input">
            <label>Selecione o usuário</label>
            <select id="selectUsuarioRedefinir"></select>
        </div>
        <div class="grupo-input">
            <label>Nova senha (mín. 8 caracteres)</label>
            <input type="password" id="novaSenhaRedefinir">
        </div>
        <div class="erro" id="erroRedefinir"></div>
        <div class="sucesso" id="sucessoRedefinir"></div>
        <div class="modal-acoes">
            <button class="btn-secundario" onclick="fecharModalRedefinir()">Cancelar</button>
            <button class="btn" onclick="confirmarRedefinirSenha()">Salvar</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlayMinhaSenha">
    <div class="modal">
        <button class="fechar" onclick="fecharModalMinhaSenha()">✕</button>
        <h3>Trocar minha senha</h3>
        <div class="grupo-input">
            <label>Senha atual</label>
            <input type="password" id="senhaAtualMinha">
        </div>
        <div class="grupo-input">
            <label>Nova senha (mín. 8 caracteres)</label>
            <input type="password" id="novaSenhaMinha">
        </div>
        <div class="erro" id="erroMinhaSenha"></div>
        <div class="sucesso" id="sucessoMinhaSenha"></div>
        <div class="modal-acoes">
            <button class="btn-secundario" onclick="fecharModalMinhaSenha()">Cancelar</button>
            <button class="btn" onclick="confirmarMinhaSenha()">Salvar</button>
        </div>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
